backend:
  name: github
  repo: gonzalonm01-debug/penadelverraco
  branch: main
  base_url: https://penadelverraco.pages.dev
  auth_endpoint: /api/auth

# Las imágenes que suba la directiva desde el panel se guardan en /uploads
media_folder: "uploads"
public_folder: "uploads"

locale: "es"

collections:
  - name: "ajustes"
    label: "🏠 Portada (hero)"
    files:
      - label: "Textos de la portada"
        name: "site"
        file: "data/site.json"
        fields:
          - {label: "Etiqueta superior", name: "eyebrow", widget: "string"}
          - {label: "Título principal", name: "titulo", widget: "string"}
          - {label: "Texto de bienvenida", name: "subtitulo", widget: "text"}
          - {label: "Logo (opcional, sustituye al dibujo del verraco si lo subes)", name: "logoImagen", widget: "image", required: false}
          - {label: "Foto de fondo de la portada", name: "heroImagen", widget: "image", required: false}
          - label: "Tamaño de la portada"
            name: "heroAltura"
            widget: "select"
            required: false
            options:
              - {label: "Compacta", value: "compacta"}
              - {label: "Normal (actual)", value: "normal"}
              - {label: "Grande", value: "grande"}
          - label: "Posición vertical de la foto de portada"
            name: "heroImagenPosicionY"
            widget: "number"
            required: false
            hint: "De 0 (arriba) a 100 (abajo). Normal = 20. Súbelo o bájalo si la foto se ve recortada por el sitio equivocado."
            value_type: "int"
            min: 0
            max: 100
          - {label: "Enlace del formulario de Votaciones (Google Forms, versión insertada)", name: "votacionesFormUrl", widget: "string", required: false, hint: "En tu Google Form: Enviar → pestaña <> → copia el enlace del src"}
          - {label: "Enlace del formulario del Buzón de sugerencias (Google Forms, versión insertada)", name: "buzonFormUrl", widget: "string", required: false}
          - {label: "Color de fondo", name: "colorFondo", widget: "color", required: false, hint: "El color oscuro de fondo de toda la web"}
          - {label: "Color del texto", name: "colorTexto", widget: "color", required: false, hint: "El color claro del texto principal"}
          - {label: "Color principal (dorado)", name: "colorPrincipal", widget: "color", required: false}
          - {label: "Color secundario (teja/rojo)", name: "colorSecundario", widget: "color", required: false}
          - {label: "Color terciario (verde)", name: "colorTerciario", widget: "color", required: false}
          - {label: "Color cuaternario (azul)", name: "colorCuaternario", widget: "color", required: false}
          - label: "Tipografía de los títulos"
            name: "fuenteTitulos"
            widget: "select"
            required: false
            options:
              - {label: "Fraunces (actual)", value: "fraunces"}
              - {label: "Playfair Display", value: "playfair"}
              - {label: "Merriweather", value: "merriweather"}
              - {label: "Libre Baskerville", value: "baskerville"}
              - {label: "Bitter", value: "bitter"}
              - {label: "Cormorant Garamond", value: "cormorant"}
              - {label: "DM Serif Display", value: "dmserif"}
              - {label: "Crimson Pro", value: "crimson"}
          - label: "Tipografía del texto normal"
            name: "fuenteTexto"
            widget: "select"
            required: false
            options:
              - {label: "Work Sans (actual)", value: "worksans"}
              - {label: "Inter", value: "inter"}
              - {label: "Lato", value: "lato"}
              - {label: "Nunito Sans", value: "nunito"}
              - {label: "Source Sans 3", value: "sourcesans"}
              - {label: "Mulish", value: "mulish"}
              - {label: "Karla", value: "karla"}
              - {label: "PT Sans", value: "ptsans"}
          - label: "Tamaño del texto"
            name: "tamanoTexto"
            widget: "select"
            required: false
            options:
              - {label: "Pequeño", value: "pequeno"}
              - {label: "Normal (actual)", value: "normal"}
              - {label: "Grande", value: "grande"}
          - label: "Tamaño de los avatares de la Junta Directiva"
            name: "juntaTamanoAvatar"
            widget: "select"
            required: false
            options:
              - {label: "Pequeño", value: "pequeno"}
              - {label: "Normal (actual)", value: "normal"}
              - {label: "Grande", value: "grande"}

  - name: "inicio"
    label: "📌 Aviso destacado (Inicio)"
    files:
      - label: "Aviso destacado"
        name: "inicio"
        file: "data/inicio.json"
        fields:
          - {label: "Etiqueta (ej. Confirmar obligatorio)", name: "tag", widget: "string"}
          - label: "Color de la etiqueta"
            name: "tagColor"
            widget: "select"
            options: ["gold", "urgent", "green", "blue"]
          - {label: "Título", name: "titulo", widget: "string"}
          - {label: "Descripción", name: "descripcion", widget: "text"}
          - {label: "Imagen / cartel", name: "imagen", widget: "image"}
          - label: "Tamaño de la imagen"
            name: "imagenAltura"
            widget: "select"
            required: false
            options:
              - {label: "Compacta", value: "compacta"}
              - {label: "Normal (actual)", value: "normal"}
              - {label: "Grande", value: "grande"}

  - name: "eventos"
    label: "🎉 Eventos"
    files:
      - label: "Lista de eventos"
        name: "eventos"
        file: "data/eventos.json"
        fields:
          - label: "Eventos"
            name: "eventos"
            widget: "list"
            summary: "{{titulo}}"
            fields:
              - {label: "Fecha/etiqueta", name: "tag", widget: "string"}
              - label: "Color de la etiqueta"
                name: "tagColor"
                widget: "select"
                options: ["gold", "urgent", "green", "blue"]
              - {label: "Título", name: "titulo", widget: "string"}
              - {label: "Descripción", name: "descripcion", widget: "text"}
              - {label: "Imagen / cartel", name: "imagen", widget: "image"}
              - label: "Tamaño de la imagen"
                name: "imagenAltura"
                widget: "select"
                required: false
                options:
                  - {label: "Compacta", value: "compacta"}
                  - {label: "Normal (actual)", value: "normal"}
                  - {label: "Grande", value: "grande"}

  - name: "junta"
    label: "🤝 Junta Directiva"
    files:
      - label: "Miembros de la junta"
        name: "junta"
        file: "data/junta.json"
        fields:
          - label: "Miembros"
            name: "miembros"
            widget: "list"
            summary: "{{nombre}} — {{cargo}}"
            fields:
              - {label: "Nombre", name: "nombre", widget: "string"}
              - {label: "Cargo", name: "cargo", widget: "string"}
              - {label: "Icono/Emoji", name: "avatar", widget: "string", hint: "Por ejemplo: 👑 🥈 📝 💰 🤝"}
              - {label: "Foto (opcional, sustituye al emoji si la subes)", name: "foto", widget: "image", required: false}

  - name: "historia"
    label: "📖 Nuestra Historia"
    files:
      - label: "Historia de la peña"
        name: "historia"
        file: "data/historia.json"
        fields:
          - {label: "Imagen (opcional)", name: "imagen", widget: "image", required: false}
          - label: "Tamaño de la imagen"
            name: "imagenAltura"
            widget: "select"
            required: false
            options:
              - {label: "Compacta", value: "compacta"}
              - {label: "Normal (actual)", value: "normal"}
              - {label: "Grande", value: "grande"}
          - label: "Párrafos de la historia"
            name: "parrafos"
            widget: "list"
            fields:
              - {label: "Párrafo", name: "texto", widget: "text"}
          - label: "Línea de tiempo"
            name: "timeline"
            widget: "list"
            summary: "{{anio}}"
            fields:
              - {label: "Año / etapa", name: "anio", widget: "string"}
              - {label: "Descripción", name: "texto", widget: "text"}
